<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Elite Predictor V8 - Pro</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #050a05;
            --panel: rgba(0, 20, 0, 0.9);
            --red: #ff3e3e;
            --green: #2ecc71;
            --violet: #9b59b6;
            --gold: #f1c40f;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--neon);
            overflow: hidden;
        }

        .app-container {
            width: 360px;
            height: 720px;
            background: linear-gradient(180deg, #0a1a0a 0%, #000 100%);
            border: 2px solid var(--neon);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }

        .status-bar {
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,255,65,0.3);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        /* Server Log Box */
        .server-log {
            font-size: 9px;
            color: #008f11;
            height: 40px;
            overflow: hidden;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border: 1px solid #004400;
        }

        .prediction-screen {
            background: var(--panel);
            border: 2px solid var(--neon);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Lock Overlay */
        #lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .period-info { font-size: 12px; opacity: 0.8; color: var(--gold); }
        .main-val { 
            font-size: 48px; 
            font-weight: 900; 
            margin: 10px 0; 
            text-shadow: 0 0 20px var(--neon);
            letter-spacing: 5px;
        }
        
        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border: 1px solid var(--neon);
            margin-top: 5px;
            display: inline-block;
        }

        .timer-box { margin: 15px 0; text-align: center; }
        #timer-num { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff; }

        .bar-bg {
            height: 4px;
            background: #002200;
            border-radius: 2px;
            margin-top: 8px;
        }
        #bar-fill {
            height: 100%;
            width: 100%;
            background: var(--neon);
            transition: 1s linear;
        }

        .history-box {
            flex-grow: 1;
            background: rgba(0,0,0,0.8);
            border: 1px solid #004400;
            border-radius: 10px;
            padding: 10px;
            font-size: 11px;
            overflow-y: auto;
        }

        .hist-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid rgba(0,255,65,0.1);
        }

        .locked-text {
            color: var(--gold);
            font-size: 12px;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        .win { color: var(--green); text-shadow: 0 0 5px var(--green); }
        .loss { color: var(--red); text-shadow: 0 0 5px var(--red); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-bar">
        <span>IP: 192.168.1.104</span>
        <span id="server-status">SERVER: CONNECTED</span>
    </div>

    <div class="server-log" id="logs">
        > Initializing Neural Link...<br>
        > Searching for Game Socket...
    </div>

    <div class="prediction-screen">
        <div id="lock-overlay">
            <div class="locked-text">🔒 RESULT LOCKED</div>
            <div style="font-size: 8px;">ENCRYPTED DATA SYNCED</div>
        </div>

        <div class="period-info">PERIOD ID: <span id="period-id">--------</span></div>
        <div id="main-val">CONNECTING</div>
        <div id="color-val" class="status-badge">WAITING FOR SERVER...</div>
    </div>

    <div class="timer-box">
        <div id="timer-num">00:00</div>
        <div class="bar-bg"><div id="bar-fill"></div></div>
    </div>

    <div class="history-box">
        <div style="text-align:center; color:var(--gold); margin-bottom:10px;">PROBABILITY DATABASE</div>
        <div id="history-content"></div>
    </div>
</div>

<script>
    let lastPeriod = "";
    let isLocked = false;
    let prediction = { size: "", color: "" };

    // सर्वर लॉग अपडेटर
    function addLog(msg) {
        const logBox = document.getElementById('logs');
        logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
    }

    // टाइमर और पीरियड लॉजिक (Real-time Sync)
    function syncEngine() {
        setInterval(() => {
            const now = new Date();
            const seconds = now.getSeconds();
            const remaining = 60 - seconds;

            // पीरियड आईडी जनरेट करना (YYYYMMDD + Minutes)
            const datePart = now.getFullYear().toString() + 
                             (now.getMonth() + 1).toString().padStart(2, '0') + 
                             now.getDate().toString().padStart(2, '0');
            const totalMinutes = now.getHours() * 60 + now.getMinutes();
            const currentPeriod = datePart + "1000" + (10001 + totalMinutes);

            document.getElementById('period-id').innerText = currentPeriod;
            document.getElementById('timer-num').innerText = `00:${remaining.toString().padStart(2, '0')}`;
            document.getElementById('bar-fill').style.width = (remaining / 60) * 100 + "%";

            // लॉजिक कंट्रोल
            if (remaining <= 50 && !isLocked) {
                fetchServerPrediction(); // 50 सेकंड पर प्रेडिक्शन लॉक करना
            }

            if (remaining === 1) {
                showResult(currentPeriod); // आखिरी सेकंड पर रिजल्ट दिखाना
            }

            if (remaining === 60) {
                resetUI(); // नया पीरियड शुरू
            }
        }, 1000);
    }

    // Simulated Server Fetch (Result Lock Feature)
    function fetchServerPrediction() {
        isLocked = true;
        addLog("Intercepting Data Packet...");
        
        setTimeout(() => {
            const sizes = ["BIG", "SMALL"];
            prediction.size = sizes[Math.floor(Math.random() * sizes.length)];
            prediction.color = (prediction.size === "BIG") ? "GREEN" : "RED";

            document.getElementById('main-val').innerText = prediction.size;
            document.getElementById('color-val').innerText = "COLOR: " + prediction.color;
            document.getElementById('lock-overlay').style.display = "flex";
            
            addLog(`Server Data Locked: ${prediction.size}`);
        }, 1500);
    }

    function showResult(period) {
        // असली गेम का रैंडम रिजल्ट
        const num = Math.floor(Math.random() * 10);
        const actualSize = (num >= 5) ? "BIG" : "SMALL";
        const isWin = (prediction.size === actualSize);

        addLog(`System Result: ${num} (${actualSize})`);
        
        updateHistory(period, num, actualSize, isWin);
    }

    function resetUI() {
        isLocked = false;
        document.getElementById('lock-overlay').style.display = "none";
        document.getElementById('main-val').innerText = "ANALYZING";
        document.getElementById('color-val').innerText = "SYNCING...";
        addLog("Ready for New Period...");
    }

    function updateHistory(p, n, s, win) {
        const content = document.getElementById('history-content');
        const row = document.createElement('div');
        row.className = 'hist-row';
        row.innerHTML = `
            <span>#${p.slice(-3)} | Res: ${n}</span>
            <span class="${win ? 'win' : 'loss'}">${win ? 'WIN ✓' : 'LOSS ✗'}</span>
        `;
        content.prepend(row);
        if (content.children.length > 8) content.removeChild(content.lastChild);
    }

    window.onload = () => {
        addLog("System Initialized...");
        syncEngine();
    };
</script>

</body>
</html>
